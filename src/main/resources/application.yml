server:
  port: 8090

spring:
  application:
    name: agent-orchestrator

scheduler:
  gateway:
    base-url: http://127.0.0.1:9001
    connect-timeout-ms: 3000
    read-timeout-ms: 5000

llm:
  provider: deepseek
  base-url: https://api.deepseek.com
  model: deepseek-chat
  connect-timeout-ms: 5000
  read-timeout-ms: 60000
  api-key: ${DEEPSEEK_API_KEY}